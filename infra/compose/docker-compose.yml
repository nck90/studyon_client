services:
  postgres:
    image: postgres:16-alpine
    container_name: studyon-postgres
    environment:
      POSTGRES_USER: studyon
      POSTGRES_PASSWORD: studyon
      POSTGRES_DB: studyon
    ports:
      - "5432:5432"
    volumes:
      - studyon-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyon -d studyon"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: studyon-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - studyon-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: studyon-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../../apps/api/.env.example
    environment:
      DATABASE_URL: postgresql://studyon:studyon@postgres:5432/studyon?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      LOG_LEVEL: info
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/v1/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  studyon-postgres-data:
  studyon-redis-data:
