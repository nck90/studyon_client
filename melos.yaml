name: studyon
repository: https://github.com/studyon/studyon

packages:
  - apps/*
  - packages/*

command:
  bootstrap:
    runPubGetInParallel: true

scripts:
  analyze:
    run: dart analyze --fatal-infos .
    exec:
      concurrency: 5
    description: Run dart analyze in all packages

  format:
    run: dart format --set-exit-if-changed .
    description: Check formatting in all packages

  test:
    run: flutter test
    exec:
      concurrency: 3
      failFast: true
    packageFilters:
      dirExists: test
    description: Run tests in all packages

  build:runner:
    run: dart run build_runner build --delete-conflicting-outputs
    exec:
      concurrency: 1
      failFast: true
    packageFilters:
      dependsOn: build_runner
    description: Run build_runner in packages that depend on it

  clean:
    run: flutter clean
    exec:
      concurrency: 5
    description: Clean all packages

  gen:
    description: Generate code for all packages
    run: melos run build:runner
