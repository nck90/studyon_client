<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

        darkMode: "class",
        theme: {
          extend: {

                    "surface-container-high": "#e7e8e9",
                    "secondary-fixed-dim": "#afc7fa",
                    "tertiary-container": "#ba5900",
                    "on-error-container": "#93000a",
                    "surface-container-low": "#f3f4f5",

                    "on-tertiary-fixed-variant": "#743500",
                    "on-primary-container": "#fefcff",
                    "on-tertiary-fixed": "#311300",
                    "surface": "#f8f9fa",
                    "on-primary-fixed": "#001a40",
                    "surface-container": "#edeeef",
                    "on-tertiary": "#ffffff",
                    "error": "#ba1a1a",
                    "primary-fixed-dim": "#acc7ff",
                    "inverse-on-surface": "#f0f1f2",

                    "on-surface": "#191c1d",
                    "inverse-surface": "#2e3132",
                    "on-surface-variant": "#414754",
                    "on-primary-fixed-variant": "#004491",
                    "on-error": "#ffffff",
                    "tertiary": "#944600",
                    "tertiary-fixed-dim": "#ffb689",
                    "surface-container-lowest": "#ffffff",
                    "outline-variant": "#c1c6d6",

                    "on-background": "#191c1d"

            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",

                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Inter"],
                    "label": ["Inter"]

<style>
        body {
            background-color: #0B1120;
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
        }
        .progress-glow {
            box-shadow: 0 0 20px rgba(16, 113, 229, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="font-body selection:bg-primary/30">
<!-- TopAppBar Section -->
<header class="fixed top-0 w-full z-50 bg-slate-950/80 backdrop-blur-xl">
<div class="flex items-center justify-between px-6 py-4 w-full max-w-xl mx-auto">
<button class="text-slate-400 active:scale-95 transition-transform duration-200 hover:bg-slate-800/50 p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg tracking-tight text-on-primary-container">Focus</h1>
<div class="w-10"></div> <!-- Spacing for center alignment -->
</div>
</header>
<main class="min-h-screen flex flex-col items-center justify-center px-8 pb-32 pt-20 max-w-xl mx-auto relative overflow-hidden">
<!-- Subtle Ambient Background Decor -->
<div class="absolute top-1/4 -left-20 w-64 h-64 bg-primary/10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-1/4 -right-20 w-64 h-64 bg-blue-600/5 blur-[100px] rounded-full"></div>
<!-- Timer Content -->
<div class="w-full text-center space-y-12 relative z-10">
<!-- Subject Badge -->
<div class="inline-flex items-center justify-center px-4 py-1.5 rounded-full bg-white/5 border border-white/10">
<span class="text-slate-300 font-medium text-sm tracking-wide">수학</span>
</div>
<!-- Primary Timer Display -->
<div class="space-y-2">
<div class="font-headline font-extrabold text-7xl md:text-8xl tracking-tighter text-white tabular-nums">
                    02:14:22
                </div>
<div class="text-slate-500 font-medium tracking-widest text-xs uppercase">Elapsed Time</div>
</div>
<!-- Progress Section -->
<div class="w-full max-w-xs mx-auto space-y-6 pt-4">
<div class="flex justify-between items-end">
<div class="flex flex-col items-start">
<span class="text-slate-400 text-xs font-semibold mb-1">Current Goal</span>
<span class="text-white text-lg font-bold">목표 3시간</span>
</div>
<div class="text-right">
<span class="text-primary-container font-extrabold text-2xl">74%</span>
</div>
</div>
<div class="h-3 w-full bg-white/5 rounded-full overflow-hidden p-0.5 border border-white/5">
<div class="h-full bg-primary-container rounded-full progress-glow relative" style="width: 74%">
<div class="absolute inset-0 bg-gradient-to-r from-transparent to-white/20"></div>
</div>
</div>
</div>
</div>
<!-- Floating Action Section (Bento-style Minimal) -->
<div class="fixed bottom-32 left-0 w-full px-8 flex gap-4 max-w-xl mx-auto">
<button class="flex-1 py-5 rounded-3xl border border-white/10 hover:bg-white/5 active:scale-95 transition-all duration-200 text-white font-bold text-lg">
                휴식
            </button>
<button class="flex-1 py-5 rounded-3xl bg-white/5 text-slate-400 hover:text-white hover:bg-white/10 active:scale-95 transition-all duration-200 font-bold text-lg">
                종료
            </button>
</div>
</main>
<!-- BottomNavBar Section -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-[2rem] bg-slate-950/80 backdrop-blur-xl shadow-[0_-8px_32px_rgba(0,0,0,0.4)]">
<div class="fixed bottom-0 left-0 w-full flex justify-around items-center px-8 pb-8 pt-4">
<!-- Active Tab: Timer -->
<a class="flex flex-col items-center justify-center bg-blue-600/10 text-blue-500 rounded-2xl p-3 active:scale-90 transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined" data-icon="timer" style="font-variation-settings: 'FILL' 1;">timer</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 p-3 hover:text-blue-400 active:scale-90 transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 p-3 hover:text-blue-400 active:scale-90 transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined" data-icon="workspace_premium">workspace_premium</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 p-3 hover:text-blue-400 active:scale-90 transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</a>
</div>
</nav>
