<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Leaderboard - Study Tracker</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed": "#ffdbc8",
                        "on-secondary-container": "#3e5682",
                        "error": "#ba1a1a",
                        "outline-variant": "#c1c6d6",
                        "surface-container-high": "#e7e8e9",
                        "primary-container": "#1071e5",
                        "on-error-container": "#93000a",
                        "on-secondary-fixed": "#001a40",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#e1e3e4",
                        "outline": "#727785",
                        "secondary-fixed-dim": "#afc7fa",
                        "primary": "#0059b9",
                        "on-background": "#191c1d",
                        "secondary": "#475e8b",
                        "surface-container": "#edeeef",
                        "tertiary": "#944600",
                        "on-primary-container": "#fefcff",
                        "inverse-primary": "#acc7ff",
                        "surface": "#f8f9fa",
                        "tertiary-fixed-dim": "#ffb689",
                        "tertiary-container": "#ba5900",
                        "surface-bright": "#f8f9fa",
                        "primary-fixed-dim": "#acc7ff",
                        "on-tertiary-fixed": "#311300",
                        "surface-dim": "#d9dadb",
                        "secondary-container": "#b5ccff",
                        "background": "#f8f9fa",
                        "on-secondary-fixed-variant": "#2e4672",
                        "inverse-on-surface": "#f0f1f2",
                        "error-container": "#ffdad6",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed-variant": "#743500",
                        "primary-fixed": "#d7e2ff",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#004491",
                        "on-tertiary-container": "#fffbff",
                        "surface-container-low": "#f3f4f5",
                        "secondary-fixed": "#d7e2ff",
                        "surface-tint": "#005bbe",
                        "on-surface-variant": "#414754",
                        "on-error": "#ffffff",
                        "surface-variant": "#e1e3e4",
                        "on-primary-fixed": "#001a40",
                        "inverse-surface": "#2e3132",
                        "on-surface": "#191c1d",
                        "on-tertiary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen pb-24">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl">
<div class="flex items-center justify-between px-8 py-4 w-full max-w-7xl mx-auto">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-blue-600 dark:text-blue-400" data-icon="leaderboard">leaderboard</span>
<span class="text-xl font-bold text-slate-900 dark:text-slate-50 font-['Plus_Jakarta_Sans'] tracking-tight">Leaderboard</span>
</div>
<div class="flex gap-6">
<button class="text-blue-600 dark:text-blue-400 font-bold border-b-2 border-blue-600 pb-1">Daily</button>
<button class="text-slate-400 dark:text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors px-2 rounded-lg">Weekly</button>
<button class="text-slate-400 dark:text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors px-2 rounded-lg">Monthly</button>
</div>
</div>
</header>
<main class="pt-24 px-6 max-w-2xl mx-auto space-y-6">
<!-- Hero Ranking Card (Asymmetric Layout) -->
<section class="relative overflow-hidden rounded-[2rem] bg-gradient-to-br from-primary to-primary-container p-8 text-on-primary shadow-xl">
<div class="relative z-10 flex flex-col gap-6">
<div>
<span class="text-primary-fixed-dim text-xs font-bold tracking-widest uppercase">Your Progress</span>
<h2 class="text-4xl font-extrabold tracking-tight mt-1">김*수 <span class="text-xl font-medium opacity-80">님</span></h2>
</div>
<div class="flex items-end justify-between">
<div>
<p class="text-5xl font-black italic">Rank 3</p>
<div class="mt-4 flex gap-2">
<span class="bg-white/20 backdrop-blur px-3 py-1 rounded-full text-[10px] font-bold">ME</span>
<span class="bg-white/20 backdrop-blur px-3 py-1 rounded-full text-[10px] font-bold uppercase">ON FIRE TODAY</span>
</div>
</div>
<div class="text-right">
<p class="text-sm opacity-70">Study Time</p>
<p class="text-2xl font-bold">5시간 58분</p>
</div>
</div>
</div>
<!-- Decorative circle -->
<div class="absolute -right-20 -top-20 w-64 h-64 bg-white/10 rounded-full blur-3xl"></div>
</section>
<!-- Top 3 Podium (Bento-style visualization) -->
<section class="grid grid-cols-3 gap-3">
<!-- Rank 2 -->
<div class="bg-surface-container-lowest p-5 rounded-3xl flex flex-col items-center justify-center text-center shadow-sm">
<div class="w-12 h-12 rounded-full bg-slate-200 mb-3 flex items-center justify-center border-4 border-surface-container">
<span class="text-slate-500 font-bold">2</span>
</div>
<p class="font-bold text-sm text-on-surface">이*혁</p>
<p class="text-[10px] text-primary font-medium mt-1">6시간 12분</p>
</div>
<!-- Rank 1 (The Hero) -->
<div class="bg-surface-container-lowest p-5 rounded-3xl flex flex-col items-center justify-center text-center shadow-md border-2 border-primary/10 relative -top-4">
<div class="absolute -top-3 left-1/2 -translate-x-1/2 bg-primary text-on-primary px-3 py-0.5 rounded-full text-[10px] font-bold">TOP</div>
<div class="w-16 h-16 rounded-full bg-yellow-400/20 mb-3 flex items-center justify-center border-4 border-yellow-400">
<span class="text-yellow-600 font-black text-xl">1</span>
</div>
<p class="font-extrabold text-base text-on-surface">박*지</p>
<p class="text-[11px] text-primary font-bold mt-1">7시간 42분</p>
</div>
<!-- Rank 3 (Duplicate of user but in podium context) -->
<div class="bg-primary/5 p-5 rounded-3xl flex flex-col items-center justify-center text-center shadow-sm border-2 border-primary/20">
<div class="w-12 h-12 rounded-full bg-blue-100 mb-3 flex items-center justify-center border-4 border-blue-200">
<span class="text-primary font-bold">3</span>
</div>
<p class="font-bold text-sm text-on-surface">김*수</p>
<p class="text-[10px] text-primary font-medium mt-1">5시간 58분</p>
</div>
</section>
<!-- Leaderboard List 4-10 -->
<section class="bg-surface-container-low rounded-[2rem] p-2">
<div class="space-y-1">
<!-- Rank 4 -->
<div class="bg-surface-container-lowest rounded-2xl p-5 flex items-center justify-between transition-all active:scale-[0.98]">
<div class="flex items-center gap-5">
<span class="text-lg font-black text-outline w-6">4</span>
<div>
<p class="font-semibold text-on-surface">최*준</p>
<span class="text-[10px] font-bold text-error uppercase">STREAK: 12D</span>
</div>
</div>
<div class="text-right">
<p class="font-bold text-on-surface-variant">5시간 12분</p>
</div>
</div>
<!-- Rank 5 -->
<div class="bg-surface-container-lowest rounded-2xl p-5 flex items-center justify-between transition-all active:scale-[0.98]">
<div class="flex items-center gap-5">
<span class="text-lg font-black text-outline w-6">5</span>
<div>
<p class="font-semibold text-on-surface">강*윤</p>
<span class="text-[10px] font-bold text-secondary uppercase">EARLY BIRD</span>
</div>
</div>
<div class="text-right">
<p class="font-bold text-on-surface-variant">4시간 55분</p>
</div>
</div>
<!-- Rank 6 -->
<div class="bg-surface-container-lowest rounded-2xl p-5 flex items-center justify-between">
<div class="flex items-center gap-5">
<span class="text-lg font-black text-outline w-6">6</span>
<div>
<p class="font-semibold text-on-surface">정*우</p>
</div>
</div>
<div class="text-right">
<p class="font-bold text-on-surface-variant">4시간 30분</p>
</div>
</div>
<!-- Rank 7 -->
<div class="bg-surface-container-lowest rounded-2xl p-5 flex items-center justify-between">
<div class="flex items-center gap-5">
<span class="text-lg font-black text-outline w-6">7</span>
<div>
<p class="font-semibold text-on-surface">임*은</p>
</div>
</div>
<div class="text-right">
<p class="font-bold text-on-surface-variant">4시간 12분</p>
</div>
</div>
<!-- Rank 8 -->
<div class="bg-surface-container-lowest rounded-2xl p-5 flex items-center justify-between">
<div class="flex items-center gap-5">
<span class="text-lg font-black text-outline w-6">8</span>
<div>
<p class="font-semibold text-on-surface">한*민</p>
</div>
</div>
<div class="text-right">
<p class="font-bold text-on-surface-variant">3시간 58분</p>
</div>
</div>
<!-- Rank 9 -->
<div class="bg-surface-container-lowest rounded-2xl p-5 flex items-center justify-between">
<div class="flex items-center gap-5">
<span class="text-lg font-black text-outline w-6">9</span>
<div>
<p class="font-semibold text-on-surface">오*석</p>
</div>
</div>
<div class="text-right">
<p class="font-bold text-on-surface-variant">3시간 45분</p>
</div>
</div>
<!-- Rank 10 -->
<div class="bg-surface-container-lowest rounded-2xl p-5 flex items-center justify-between">
<div class="flex items-center gap-5">
<span class="text-lg font-black text-outline w-6">10</span>
<div>
<p class="font-semibold text-on-surface">권*태</p>
</div>
</div>
<div class="text-right">
<p class="font-bold text-on-surface-variant">3시간 32분</p>
</div>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pt-2 pb-6 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl rounded-t-[24px] shadow-[0_-4px_24px_rgba(0,0,0,0.04)] z-50">
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-4 py-2 hover:text-slate-900 dark:hover:text-slate-100 transition-transform duration-200 active:scale-90">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-['Inter'] text-[11px] font-medium">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/30 rounded-2xl px-4 py-2 transition-transform duration-200 active:scale-90">
<span class="material-symbols-outlined" data-icon="emoji_events" style="font-variation-settings: 'FILL' 1;">emoji_events</span>
<span class="font-['Inter'] text-[11px] font-medium">Ranking</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-4 py-2 hover:text-slate-900 dark:hover:text-slate-100 transition-transform duration-200 active:scale-90">
<span class="material-symbols-outlined" data-icon="bar_chart">bar_chart</span>
<span class="font-['Inter'] text-[11px] font-medium">Stats</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-4 py-2 hover:text-slate-900 dark:hover:text-slate-100 transition-transform duration-200 active:scale-90">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Inter'] text-[11px] font-medium">Profile</span>
</button>
</nav>
</body></html>
