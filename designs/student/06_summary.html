</div>

</div>
<div class="relative z-10 flex items-center justify-between">
<div>

</div>
<div class="w-12 h-12 bg-primary-container flex items-center justify-center rounded-full text-white">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
</div>
</div>
</div>

</div>

</div>

</div>

</div>
</div>
