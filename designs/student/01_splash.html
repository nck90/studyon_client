<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>StudyON - Premium Study Room</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-error": "#ffffff",
                    "on-secondary-fixed": "#001a40",
                    "primary-fixed": "#d7e2ff",
                    "on-background": "#191c1d",
                    "error": "#ba1a1a",
                    "on-surface-variant": "#414754",
                    "on-tertiary-fixed": "#311300",
                    "surface-container-highest": "#e1e3e4",
                    "primary-fixed-dim": "#acc7ff",
                    "surface-dim": "#d9dadb",
                    "on-error-container": "#93000a",
                    "surface-bright": "#f8f9fa",
                    "on-secondary-fixed-variant": "#2e4672",
                    "surface": "#f8f9fa",
                    "on-primary-fixed-variant": "#004491",
                    "on-tertiary": "#ffffff",
                    "tertiary-fixed": "#ffdbc8",
                    "secondary-fixed-dim": "#afc7fa",
                    "tertiary": "#944600",
                    "inverse-on-surface": "#f0f1f2",
                    "surface-tint": "#005bbe",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-low": "#f3f4f5",
                    "error-container": "#ffdad6",
                    "outline-variant": "#c1c6d6",
                    "tertiary-container": "#ba5900",
                    "secondary-fixed": "#d7e2ff",
                    "inverse-primary": "#acc7ff",
                    "on-primary-container": "#fefcff",
                    "on-primary": "#ffffff",
                    "surface-variant": "#e1e3e4",
                    "secondary": "#475e8b",
                    "background": "#f8f9fa",
                    "primary-container": "#1071e5",
                    "on-tertiary-container": "#fffbff",
                    "on-surface": "#191c1d",
                    "surface-container": "#edeeef",
                    "on-secondary": "#ffffff",
                    "inverse-surface": "#2e3132",
                    "on-primary-fixed": "#001a40",
                    "on-tertiary-fixed-variant": "#743500",
                    "tertiary-fixed-dim": "#ffb689",
                    "on-secondary-container": "#3e5682",
                    "outline": "#727785",
                    "primary": "#0059b9"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin 1.5s linear infinite;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
        .font-headline {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface antialiased overflow-hidden">
<!-- Main Content Canvas -->
<main class="relative h-screen w-full flex flex-col items-center justify-between py-24 px-8 overflow-hidden">
<!-- Top Empty Space for Asymmetry -->
<div class="h-12 w-full"></div>
<!-- Central Branding Anchor -->
<div class="flex flex-col items-center text-center space-y-4">
<!-- Brand Mark / Logo Placeholder -->
<div class="mb-2">
<div class="w-16 h-16 bg-primary-container rounded-[22px] flex items-center justify-center shadow-lg shadow-primary/10">
<span class="material-symbols-outlined text-on-primary-container text-4xl" data-icon="menu_book">menu_book</span>
</div>
</div>
<!-- App Name: StudyON -->
<h1 class="font-headline text-5xl font-extrabold tracking-tighter text-primary">
                StudyON
            </h1>
<!-- Korean Subtitle -->
<p class="text-on-surface-variant font-medium text-lg tracking-normal opacity-80">
                오늘도 집중해봅시다
            </p>
</div>
<!-- Footer Area with Loading Indicator -->
<div class="flex flex-col items-center space-y-12">
<!-- Minimal Circular Loading Spinner -->
<div class="relative flex items-center justify-center">
<div class="w-12 h-12 border-[2.5px] border-primary/10 rounded-full"></div>
<div class="absolute w-12 h-12 border-[2.5px] border-transparent border-t-primary rounded-full animate-spin-slow"></div>
</div>
<!-- Bottom Brand Identifier -->
<div class="flex items-center space-y-1">
<p class="text-xs font-semibold tracking-widest text-outline uppercase opacity-40">
                    Premium Education Experience
                </p>
</div>
</div>
<!-- Background Aesthetic Elements (Abstract Glassmorphism Tones) -->
<div class="absolute -top-24 -right-24 w-96 h-96 bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute -bottom-24 -left-24 w-96 h-96 bg-secondary-container/10 rounded-full blur-[100px] pointer-events-none"></div>
</main>
<!-- 
        Note: Per instructions, TopAppBar and BottomNavBar are suppressed 
        because the page intent is "Splash Screen" (Transactional/Linear flow).
    -->
</body></html>
