name: studyon_client
description: "StudyON admin client app"
publish_to: 'none'

version: 1.0.2+7

environment:
  sdk: ^3.10.1

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.0
  go_router: ^14.0.0
  shared_preferences: ^2.3.0
  dio: ^5.8.0
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  studyon_design_system:
    path: ../../packages/design_system
  studyon_models:
    path: ../../packages/models
  studyon_core:
    path: ../../packages/core
  studyon_api_client:
    path: ../../packages/api_client
  studyon_auth:
    path: ../../packages/auth

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/images/

  fonts:
    - family: TossFace
      fonts:
        - asset: assets/fonts/TossFace.ttf
